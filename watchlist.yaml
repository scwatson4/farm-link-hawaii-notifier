collections_to_monitor:
  - produce
  - drinks

rules:
  - name: "Mango"
    collections: [produce]
    match_any:
      - title_contains: mango

  - name: "Lilikoi / Passionfruit"
    collections: [produce]
    match_any:
      - title_contains: lilikoi
      - title_contains: passion fruit
      - title_contains: passionfruit

  - name: "Lychee"
    collections: [produce]
    match_any:
      - title_contains: lychee

  - name: "Rambutan"
    collections: [produce]
    match_any:
      - title_contains: rambutan

  - name: "Dragon fruit"
    collections: [produce]
    match_any:
      - title_contains: dragon fruit
      - title_contains: pitaya

  - name: "Coconut"
    collections: [produce]
    match_any:
      - title_contains: coconut

  - name: "Sugarcane (produce)"
    collections: [produce]
    match_any:
      - title_contains: sugarcane
      - title_contains: sugar cane

  - name: "Sugarcane juice (drinks)"
    collections: [drinks]
    match_any:
      - title_contains: sugarcane juice
      - title_contains: cane juice

  - name: "Pineapple (not Dole)"
    collections: [produce]
    match_any:
      - title_contains: pineapple
    exclude_if_any:
      - vendor_equals: Dole
      - title_contains: dole

  - name: "Sweet Cane Cafe drinks (not Cacao Nectar)"
    collections: [drinks]
    match_any:
      - vendor_equals: Sweet Cane Cafe
    exclude_if_any:
      - title_contains: cacao nectar
